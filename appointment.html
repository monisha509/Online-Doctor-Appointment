<!DOCTYPE html>
<html>
<head>

<title>Book Appointment</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="apply-bg">

<div class="apply-form">

<h2 class="text-center">Appointment Form</h2>

<form action="success.html">

<label>Doctor</label>
<input id="doctorName" class="form-control mb-3" readonly>

<input class="form-control mb-3" placeholder="Patient Name" required>

<input class="form-control mb-3" type="email" placeholder="Email" required>

<input class="form-control mb-3" placeholder="Contact Number" required>

<input class="form-control mb-3" type="date" required>

<button class="btn btn-success w-100">
Confirm Appointment
</button>

</form>

</div>

<script>

const params=new URLSearchParams(window.location.search)

const doctor=params.get("doctor")

document.getElementById("doctorName").value=doctor

</script>

</body>
</html>
